// ─── HELPERS ─────────────────────────────────────────────────────────────────
const NS = 6;
const AC = "#16a34a";
const SK = {L:"bk26-lineups",R:"bk26-results",N:"bk26-notes"};

const byLK = arr => [...arr].sort((a,b)=>a.lk-b.lk);

const winProb = (a,b) => Math.round(100/(1+Math.pow(10,-(b-a)/4)));

const probStyle = p => {
  if(p>=68) return {bg:"#14532d",border:"#166534",text:"#86efac",label:"Favorit"};
  if(p>=55) return {bg:"#1a3a20",border:"#166534",text:"#bbf7d0",label:"leicht Fav."};
  if(p>=45) return {bg:"#3f2a04",border:"#854d0e",text:"#fde68a",label:"ausgeglichen"};
  if(p>=32) return {bg:"#3b0f0f",border:"#7f1d1d",text:"#fca5a5",label:"leicht Außens."};
  return {bg:"#2a0606",border:"#450a0a",text:"#f87171",label:"Außenseiter"};
};

function parseResult(str){
  if(!str||!str.trim()) return null;
  const sets=str.trim().split(/\s+/);
  let w=0,l=0;
  for(const s of sets){
    const m=s.match(/^(\d+)[:\-](\d+)$/);
    if(!m) return null;
    +m[1]>+m[2]?w++:+m[2]>+m[1]?l++:null;
  }
  return w>l?'W':l>w?'L':null;
}

function isToday(ds){
  const m=ds.match(/(\d{2})\.(\d{2})\./);
  if(!m) return false;
  const n=new Date();
  return +m[1]===n.getDate()&&+m[2]===(n.getMonth()+1);
}

function fmtDate(ds){
  const days={'Mo.':'Montag','Di.':'Dienstag','Mi.':'Mittwoch',
    'Do.':'Donnerstag','Fr.':'Freitag','Sa.':'Samstag','So.':'Sonntag'};
  const m=ds.match(/^(\S+)\s+(.+)$/);
  return m?(days[m[1]]||m[1])+', '+m[2]+'2026':ds+'2026';
}

// ─── STORAGE ─────────────────────────────────────────────────────────────────
function defStates(){
  return OPPONENTS.map(opp=>({
    beck:byLK(BECKSTEIN_ROSTER).slice(0,NS),
    opp:byLK(opp.players).slice(0,NS),
  }));
}

async function loadAll(){
  const st={states:defStates(),results:OPPONENTS.map(()=>Array(NS).fill("")),notes:OPPONENTS.map(()=>"")};
  const stor=window.storage||{get:async k=>{try{const v=localStorage.getItem(k);return v?{value:v}:null;}catch{return null;}},set:async(k,v)=>{try{localStorage.setItem(k,v);}catch{}}};
  try{
    const [sl,rl,nl]=await Promise.all([stor.get(SK.L).catch(()=>null),stor.get(SK.R).catch(()=>null),stor.get(SK.N).catch(()=>null)]);
    if(sl){const sv=JSON.parse(sl.value);if(sv?.length===OPPONENTS.length){
      const rec=OPPONENTS.map((opp,i)=>{
        const bs=(sv[i]?.beck||[]).map(n=>BECKSTEIN_ROSTER.find(p=>p.name===n)).filter(Boolean);
        const os=(sv[i]?.opp||[]).map(n=>opp.players.find(p=>p.name===n)).filter(Boolean);
        return bs.length===NS&&os.length===NS?{beck:bs,opp:os}:{beck:byLK(BECKSTEIN_ROSTER).slice(0,NS),opp:byLK(opp.players).slice(0,NS)};
      });st.states=rec;}}
    if(rl){const rv=JSON.parse(rl.value);if(rv?.length===OPPONENTS.length)st.results=rv;}
    if(nl){const nv=JSON.parse(nl.value);if(nv?.length===OPPONENTS.length)st.notes=nv;}
  }catch{}
  return st;
}

function saveAll(key,data){
  const stor=window.storage||{set:async(k,v)=>{try{localStorage.setItem(k,v);}catch{}}};
  stor.set(key,JSON.stringify(data)).catch(()=>{});
}

  doc.setFillColor(opp.home?12:80,opp.home?80:80,opp.home?40:80);

  // Section: Einzel
  doc.setTextColor(30,30,30);
  doc.setFont('helvetica','bold');
  doc.setFontSize(11);
  doc.text('EINZEL',14,77);

  const wins=results.filter(r=>parseResult(r)==='W').length;
  const losses=results.filter(r=>parseResult(r)==='L').length;

  const body=beckL.map((lp,i)=>{
    const op=oppL[i];
    const prob=winProb(lp.lk,op.lk);
    const res=results[i]||'';
    const wl=parseResult(res);
    return [
      String(i+1),
      `${lp.name}\nLK ${lp.lk.toFixed(1)}  *${lp.jg}`,
      `${op.name}\nLK ${op.lk.toFixed(1)}  *${op.jg}`,
      `${prob}%`,
      res||'--',
      wl==='W'?'Sieg':wl==='L'?'Nied.':'-',
    ];
  });

  doc.autoTable({
    startY:81,
    head:[['#','TC Beckstein (LK)',`${opp.short} (LK)`,'Prog.','Ergebnis','P']],
    body,
    theme:'grid',
    headStyles:{fillColor:[12,80,40],textColor:[255,255,255],fontSize:9,fontStyle:'bold',cellPadding:3.5},
    bodyStyles:{fontSize:8.5,cellPadding:3,valign:'middle'},

      4:{cellWidth:26,halign:'center',fontStyle:'bold'},
      5:{cellWidth:14,halign:'center',fontStyle:'bold'},

        d.cell.styles.textColor=[30,30,120];
    },
    margin:{left:14,right:14},
  });

  let y=doc.lastAutoTable.finalY+8;

  // Score summary box
  const played=wins+losses;
  const expPts=beckL.reduce((s,lp,i)=>s+winProb(lp.lk,oppL[i].lk)/100,0);
  doc.setFillColor(230,245,234);

  doc.setFontSize(12);

  doc.setFont('helvetica','normal');

  doc.setTextColor(30,30,30);
  doc.text('DOPPEL',14,y);
  doc.autoTable({
    startY:y+4,
    head:[['#','TC Beckstein','Gegner','Ergebnis','P']],
    body:[['D1','__________________','__________________','',''],['D2','__________________','__________________','','']],
    theme:'grid',
    headStyles:{fillColor:[12,80,40],textColor:[255,255,255],fontSize:9,fontStyle:'bold',cellPadding:3},
    bodyStyles:{fontSize:9,cellPadding:5,minCellHeight:12},
    columnStyles:{0:{cellWidth:10,halign:'center'},3:{cellWidth:26,halign:'center'},4:{cellWidth:10,halign:'center'}},

  // Gesamtergebnis
  doc.setFillColor(243,246,250);
  doc.roundedRect(14,y,182,14,2,2,'F');
  doc.setFont('helvetica','bold');
  doc.setFontSize(10);
  doc.setTextColor(30,30,30);
  doc.text('Gesamtergebnis (Einzel + Doppel):',18,y+9);
  doc.text('_____ : _____',160,y+9,{align:'center'});

  y+=22;

  // Bemerkungen
  doc.setFont('helvetica','bold');
  doc.setFontSize(10);
  doc.setTextColor(30,30,30);
  doc.text('Bemerkungen / Notizen:',14,y);
  y+=6;

  let notesH=12;
  if(notes&&notes.trim()){
    doc.setFont('helvetica','normal');
    doc.setFontSize(9);
    doc.setTextColor(50,50,50);
    const lines=doc.splitTextToSize(notes.trim(),182);
    doc.text(lines,14,y);
    notesH=lines.length*5+4;

    doc.setFillColor(250,250,250);
    doc.rect(14,y,182,12,'F');
    doc.setDrawColor(200,200,200);
    doc.rect(14,y,182,12,'S');
    doc.setFont('helvetica','italic');
    doc.setFontSize(8.5);

    doc.text('(keine Bemerkungen)',105,y+8,{align:'center'});
  }

  y+=notesH+12;

  // Signatures
  const sigY=Math.max(y,245);
  if(sigY>275){doc.addPage();y=20;}
  const sy=sigY>275?20:sigY;

  doc.setTextColor(160,160,160);

  doc.text(`Erstellt am ${today}  |  TC Beckstein Begegnungsanalyse-App  |  BTV Badenliga H65 Gr. 022`,105,290,{align:'center'});

  const fname=`Protokoll_Beckstein_${opp.short.replace(/[\s\/]+/g,'_')}_${opp.date.replace('Fr. ','').replace(/\./g,'').trim()}.pdf`;
  doc.save(fname);
}

// ─── PLAYER CELL ─────────────────────────────────────────────────────────────
function PlayerCell({player,roster,onSelect,flip,accent}){
  const [open,setOpen]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{
    const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    document.addEventListener("mousedown",h);
    return()=>document.removeEventListener("mousedown",h);
  },[]);
  const sorted=byLK(roster);
  const better=sorted.filter(p=>p.lk<player.lk);
  const worse=sorted.filter(p=>p.lk>player.lk||(p.lk===player.lk&&p.name!==player.name));
  const hasOpts=better.length+worse.length>0;
  const curRank=sorted.findIndex(p=>p.name===player.name)+1;
  const isK=player.name.includes("Kleist");

  const Row=p=>{
    const diff=p.lk-player.lk;
    const dc=diff<0?"#86efac":diff>0?"#f87171":"#94a3b8";
    const rk=sorted.findIndex(r=>r.name===p.name)+1;
    return (
      <div key={p.name} onClick={()=>{onSelect(p);setOpen(false);}}
        style={{display:"flex",justifyContent:"space-between",alignItems:"center",
          padding:"7px 12px",cursor:"pointer",borderBottom:"1px solid rgba(255,255,255,0.04)"}}
        onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.08)"}
        onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
        <div>
          <div style={{fontSize:12,color:"#e2e8f0"}}>{p.name}</div>
          <div style={{fontSize:10,color:"#475569",marginTop:1}}>Rang {rk}</div>
        </div>
        <div style={{textAlign:"right",fontFamily:"monospace",fontSize:11}}>
          <div style={{color:dc,fontWeight:600}}>LK {p.lk.toFixed(1)}
            {diff!==0&&<span style={{fontSize:10,opacity:.75,marginLeft:3}}>({diff>0?"+":""}{diff.toFixed(1)})</span>}
          </div>
          <div style={{color:"#475569"}}>*{p.jg}</div>
        </div>
      </div>
    );
  };
  const SL=({label,color})=>(
    <div style={{padding:"4px 12px 3px",fontSize:9,color,textTransform:"uppercase",
      letterSpacing:"0.09em",background:"rgba(255,255,255,0.025)",
      borderBottom:"1px solid rgba(255,255,255,0.05)",position:"sticky",top:36}}>{label}</div>
  );
  return (
    <div ref={ref} style={{position:"relative"}}>
      <div onClick={()=>hasOpts&&setOpen(v=>!v)} style={{
        display:"flex",flexDirection:flip?"row-reverse":"row",alignItems:"center",gap:5,
        cursor:hasOpts?"pointer":"default",padding:"6px 8px",borderRadius:8,
        border:`1px solid ${open?accent:isK?accent+"66":"rgba(255,255,255,0.09)"}`,
        background:open?`${accent}18`:isK?`${accent}0d`:"rgba(255,255,255,0.03)",
        transition:"all 0.15s",userSelect:"none",minHeight:50}}>
        <div style={{flex:1,textAlign:flip?"right":"left"}}>
          <div style={{fontSize:12,fontWeight:600,color:isK?"#86efac":"#f1f5f9",lineHeight:1.3}}>{player.name}</div>
          <div style={{fontSize:10,color:"#64748b",marginTop:2,fontFamily:"monospace"}}>LK {player.lk.toFixed(1)} · *{player.jg}</div>
        </div>
        {hasOpts&&<div style={{fontSize:10,color:open?accent:"#475569",transform:open?"rotate(180deg)":"none",transition:"transform 0.18s",lineHeight:1,flexShrink:0}}>▾</div>}
      </div>
      {open&&(
        <div style={{position:"absolute",top:"calc(100% + 4px)",left:flip?"auto":0,right:flip?0:"auto",
          zIndex:200,width:245,background:"#1e293b",border:`1px solid ${accent}55`,borderRadius:10,
          boxShadow:"0 12px 40px rgba(0,0,0,0.75)",maxHeight:320,overflowY:"auto"}}>
          <div style={{padding:"7px 12px",fontSize:10,color:"#475569",textTransform:"uppercase",
            letterSpacing:"0.09em",borderBottom:"1px solid rgba(255,255,255,0.07)",
            background:"#1e293b",position:"sticky",top:0,zIndex:1}}>
            Spieler wechseln · Rang {curRank}
          </div>
          {better.length>0&&<><SL label="↑ Rückgängig (bessere LK)" color="#86efac"/>{better.map(Row)}</>}
          {worse.length>0&&<><SL label="↓ Ersatz (schlechtere LK)" color="#f87171"/>{worse.map(Row)}</>}
        </div>
      )}
    </div>
  );
}

// ─── MATCH ROW ───────────────────────────────────────────────────────────────
function MatchRow({pos,lp,op,oppRoster,onBeckSelect,onOppSelect,result,onResult}){
  const prob=winProb(lp.lk,op.lk);
  const col=probStyle(prob);
  const wl=parseResult(result);
  return (
    <div style={{padding:"10px 10px 8px",borderBottom:"1px solid rgba(255,255,255,0.06)",
      background:pos%2===0?"rgba(255,255,255,0.015)":"transparent"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:7}}>
        <div style={{width:22,height:22,borderRadius:"50%",background:"rgba(255,255,255,0.07)",
          display:"flex",alignItems:"center",justifyContent:"center",
          fontSize:10,fontWeight:700,color:"#94a3b8",flexShrink:0}}>{pos}</div>
        <div style={{flex:1,position:"relative",height:22}}>
          <div style={{position:"absolute",inset:0,background:"rgba(255,255,255,0.04)",borderRadius:5}}>
            <div style={{position:"absolute",left:0,top:0,bottom:0,width:`${prob}%`,
              background:col.bg,border:`1px solid ${col.border}`,borderRadius:5,transition:"width 0.35s ease"}}/>
          </div>
          <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",
            justifyContent:"center",fontSize:11,fontWeight:700,color:col.text,fontFamily:"monospace",gap:5}}>
            <span>{prob}%</span>
            <span style={{fontWeight:400,fontSize:10,opacity:.85}}>{col.label}</span>
          </div>
        </div>
        {wl&&(
          <div style={{padding:"2px 7px",borderRadius:4,fontSize:10,fontWeight:700,flexShrink:0,
            background:wl==='W'?"#14532d":"#450a0a",
            color:wl==='W'?"#86efac":"#f87171",
            border:`1px solid ${wl==='W'?"#166534":"#7f1d1d"}`}}>
            {wl==='W'?'SIEG':'NIED.'}
          </div>
        )}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:6}}>
        <PlayerCell player={lp} roster={BECKSTEIN_ROSTER} onSelect={onBeckSelect} flip={false} accent={AC}/>
        <PlayerCell player={op} roster={oppRoster} onSelect={onOppSelect} flip={true} accent="#64748b"/>
      </div>
      <input type="text" value={result} onChange={e=>onResult(e.target.value)}
        placeholder="Ergebnis  z.B.  6:3  6:4"
        style={{width:"100%",background:"rgba(255,255,255,0.05)",outline:"none",
          border:`1px solid ${wl==='W'?"rgba(22,163,74,0.45)":wl==='L'?"rgba(220,38,38,0.45)":"rgba(255,255,255,0.11)"}`,
          borderRadius:6,color:"#e2e8f0",fontSize:11,padding:"4px 8px",fontFamily:"monospace",textAlign:"center"}}/>
    </div>
  );
}

// ─── MATCH VIEW ──────────────────────────────────────────────────────────────
function MatchView({opp,beckL,oppL,onBeckSel,onOppSel,results,onResult,notes,onNotes,onReset,onPDF}){
  const probs=beckL.map((p,i)=>winProb(p.lk,oppL[i].lk));
  const avg=Math.round(probs.reduce((a,b)=>a+b)/NS);
  const exp=probs.reduce((s,p)=>s+p/100,0);
  const col=probStyle(avg);
  const wins=results.filter(r=>parseResult(r)==='W').length;
  const losses=results.filter(r=>parseResult(r)==='L').length;
  const played=wins+losses;
  const today=isToday(opp.date);
  return (
    <div>
      {/* Header card */}
      <div style={{background:"rgba(255,255,255,0.03)",borderRadius:10,padding:"12px 14px",
        marginBottom:10,border:`1px solid ${today?"rgba(250,204,21,0.35)":"rgba(255,255,255,0.07)"}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{fontSize:10,color:today?"#facc15":"#64748b",textTransform:"uppercase",
              letterSpacing:"0.1em",marginBottom:3,fontWeight:today?700:400}}>
              {opp.date} · 11:00 Uhr · {opp.home?"Heim":"Auswärts"}
              {today&&<span style={{marginLeft:6,background:"#facc15",color:"#111",
                padding:"1px 6px",borderRadius:3,fontWeight:800,fontSize:9}}>HEUTE</span>}
            </div>
            <div style={{fontSize:15,fontWeight:700,color:"#f1f5f9"}}>
              {opp.home?`vs. ${opp.short}`:`bei ${opp.short}`}
            </div>
            {played>0&&(
              <div style={{fontSize:11,marginTop:4}}>
                <span style={{color:"#94a3b8"}}>Einzel: </span>
                <span style={{color:"#86efac",fontWeight:700}}>{wins}</span>
                <span style={{color:"#64748b"}}> : </span>
                <span style={{color:"#f87171",fontWeight:700}}>{losses}</span>
                <span style={{color:"#64748b"}}> ({played}/6)</span>
              </div>
            )}
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:24,fontWeight:900,color:col.text,fontFamily:"monospace",lineHeight:1}}>{avg}%</div>
            <div style={{fontSize:10,color:"#64748b",marginTop:2}}>{exp.toFixed(1)} Pkt erw.</div>
          </div>
        </div>
        <div style={{display:"flex",gap:6,marginTop:10}}>
          <button onClick={onPDF} style={{flex:1,padding:"7px 10px",borderRadius:7,cursor:"pointer",
            background:"rgba(22,163,74,0.15)",border:"1px solid rgba(22,163,74,0.4)",
            color:"#86efac",fontSize:11,fontWeight:600}}>
            ↓ PDF Protokoll
          </button>
          <button onClick={onReset} style={{padding:"7px 12px",borderRadius:7,cursor:"pointer",
            background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.12)",
            color:"#94a3b8",fontSize:11}}>
            Reset
          </button>
        </div>
      </div>
      {/* Column labels */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,
        padding:"0 10px 5px",fontSize:10,color:"#475569",textTransform:"uppercase",letterSpacing:"0.08em"}}>
        <div style={{color:"#86efac"}}>TC Beckstein</div>
        <div style={{textAlign:"right"}}>{opp.short}</div>
      </div>
      {/* Singles */}
      <div style={{borderRadius:10,border:"1px solid rgba(255,255,255,0.08)"}}>
        {beckL.map((lp,i)=>(
          <MatchRow key={i} pos={i+1} lp={lp} op={oppL[i]} oppRoster={opp.players}
            onBeckSelect={p=>onBeckSel(i,p)} onOppSelect={p=>onOppSel(i,p)}
            result={results[i]} onResult={v=>onResult(i,v)}/>
        ))}
      </div>
      {/* Notes */}
      <div style={{marginTop:12}}>
        <div style={{fontSize:10,color:"#475569",textTransform:"uppercase",
          letterSpacing:"0.09em",marginBottom:5}}>Spielnotizen</div>
        <textarea value={notes} onChange={e=>onNotes(e.target.value)} rows={3}
          placeholder="Notizen zu dieser Begegnung (Aufstellung, Besonderheiten, Ergebnis Doppel, Wetter...)"
          style={{width:"100%",background:"rgba(255,255,255,0.04)",
            border:"1px solid rgba(255,255,255,0.11)",borderRadius:8,
            color:"#e2e8f0",fontSize:12,padding:"8px 10px",outline:"none",lineHeight:1.5}}/>
      </div>
      <div style={{fontSize:10,color:"#334155",marginTop:6,paddingLeft:3}}>
        ▾ Klick auf Spieler tauscht Aufstellung · ★ = Kleist · Ergebnis: 6:3 6:4 oder 3:6 6:3 10:7
      </div>
    </div>
  );
}

// ─── APP ─────────────────────────────────────────────────────────────────────
function App(){
  const [active,setActive]=useState(0);
  const [loaded,setLoaded]=useState(false);
  const [states,setStates]=useState(defStates);
  const [results,setResults]=useState(()=>OPPONENTS.map(()=>Array(NS).fill("")));
  const [notes,setNotes]=useState(()=>OPPONENTS.map(()=>""));

  useEffect(()=>{
    loadAll().then(d=>{setStates(d.states);setResults(d.results);setNotes(d.notes);setLoaded(true);});
  },[]);

  useEffect(()=>{
    if(!loaded) return;
    saveAll(SK.L,states.map(s=>({beck:s.beck.map(p=>p.name),opp:s.opp.map(p=>p.name)})));
  },[states,loaded]);

  useEffect(()=>{if(!loaded) return;saveAll(SK.R,results);},[results,loaded]);
  useEffect(()=>{if(!loaded) return;saveAll(SK.N,notes);},[notes,loaded]);

  const setBeck=(mi,ri,p)=>setStates(prev=>{const n=prev.map(s=>({beck:[...s.beck],opp:[...s.opp]}));n[mi].beck[ri]=p;return n;});
  const setOpp=(mi,ri,p)=>setStates(prev=>{const n=prev.map(s=>({beck:[...s.beck],opp:[...s.opp]}));n[mi].opp[ri]=p;return n;});
  const setResult=(mi,ri,v)=>setResults(prev=>{const n=prev.map(r=>[...r]);n[mi][ri]=v;return n;});
  const setNote=(mi,v)=>setNotes(prev=>{const n=[...prev];n[mi]=v;return n;});
  const resetMatch=mi=>setStates(prev=>{const n=[...prev];n[mi]={beck:byLK(BECKSTEIN_ROSTER).slice(0,NS),opp:byLK(OPPONENTS[mi].players).slice(0,NS)};return n;});

  if(!loaded) return (
    <div style={{minHeight:"100vh",background:"#0a0f1e",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{color:"#64748b",fontSize:13}}>Lade gespeicherte Daten …</div>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:"#0a0f1e",color:"#e2e8f0",
      fontFamily:"'Segoe UI',sans-serif",maxWidth:680,margin:"0 auto",paddingBottom:48}}>

      {/* App header */}
      <div style={{padding:"18px 16px 14px",borderBottom:"1px solid rgba(255,255,255,0.07)",
        background:"linear-gradient(180deg,rgba(22,163,74,.12) 0%,transparent 100%)"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
          <div style={{width:9,height:9,borderRadius:"50%",background:AC,boxShadow:`0 0 8px ${AC}`}}/>
          <span style={{fontSize:10,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.12em"}}>
            BTV · Baden Sommer 2026 · Badenliga Gr. 022
          </span>
        </div>
        <div style={{fontSize:20,fontWeight:800,color:"#f8fafc",letterSpacing:"-0.02em"}}>
          TC Beckstein — Begegnungsanalyse
        </div>
        <div style={{fontSize:12,color:"#64748b",marginTop:3}}>
          Herren 65 · 6er Staffel · Badenliga · Aufstellungen &amp; Ergebnisse werden automatisch gespeichert
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",overflowX:"auto",gap:6,padding:"10px 16px",
        borderBottom:"1px solid rgba(255,255,255,0.07)",scrollbarWidth:"none"}}>
        {OPPONENTS.map((opp,i)=>{
          const s=states[i];
          const avg=Math.round(s.beck.map((p,j)=>winProb(p.lk,s.opp[j].lk)).reduce((a,b)=>a+b)/NS);
          const col=probStyle(avg);
          const on=active===i;
          const today=isToday(opp.date);
          const w=results[i].filter(r=>parseResult(r)==='W').length;
          const l=results[i].filter(r=>parseResult(r)==='L').length;
          const played=w+l;
          return (
            <button key={i} onClick={()=>setActive(i)} style={{
              flexShrink:0,cursor:"pointer",textAlign:"left",padding:"7px 12px",borderRadius:8,
              background:on?"rgba(22,163,74,.18)":today?"rgba(250,204,21,0.07)":"rgba(255,255,255,.04)",
              border:on?"1px solid rgba(22,163,74,.5)":today?"1px solid rgba(250,204,21,0.4)":"1px solid rgba(255,255,255,.09)",
              transition:"all .15s"}}>
              <div style={{fontSize:10,color:today?"#facc15":"#64748b",marginBottom:2,fontWeight:today?700:400}}>
                {opp.date}{today?" · HEUTE":""}
              </div>
              <div style={{fontSize:12,fontWeight:600,color:on?"#f1f5f9":"#94a3b8"}}>{opp.short}</div>
              <div style={{display:"flex",alignItems:"center",gap:5,marginTop:1}}>
                <div style={{fontSize:12,fontWeight:700,color:col.text,fontFamily:"monospace"}}>{avg}%</div>
                {played>0&&<div style={{fontSize:10,fontFamily:"monospace"}}>
                  <span style={{color:"#86efac"}}>{w}</span>
                  <span style={{color:"#475569"}}>:</span>
                  <span style={{color:"#f87171"}}>{l}</span>
                </div>}
              </div>
            </button>
          );
        })}
      </div>

      {/* Match view */}
      <div style={{padding:"14px 16px"}}>
        <MatchView
          opp={OPPONENTS[active]}
          beckL={states[active].beck} oppL={states[active].opp}
          onBeckSel={(ri,p)=>setBeck(active,ri,p)}
          onOppSel={(ri,p)=>setOpp(active,ri,p)}
          results={results[active]} onResult={(ri,v)=>setResult(active,ri,v)}
          notes={notes[active]} onNotes={v=>setNote(active,v)}
          onReset={()=>resetMatch(active)}
          onPDF={()=>generatePDF(OPPONENTS[active],states[active].beck,states[active].opp,results[active],notes[active])}
        />
      </div>

      {/* Season overview */}
      <div style={{padding:"0 16px"}}>
        <div style={{fontSize:10,color:"#475569",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8}}>
          Saisonübersicht
        </div>
        <div style={{borderRadius:10,border:"1px solid rgba(255,255,255,0.08)"}}>
          {OPPONENTS.map((opp,i)=>{
            const s=states[i];
            const probs=s.beck.map((p,j)=>winProb(p.lk,s.opp[j].lk));
            const avg=Math.round(probs.reduce((a,b)=>a+b)/NS);
            const exp=probs.reduce((s,p)=>s+p/100,0);
            const col=probStyle(avg);
            const w=results[i].filter(r=>parseResult(r)==='W').length;
            const l=results[i].filter(r=>parseResult(r)==='L').length;
            const played=w+l;
            const today=isToday(opp.date);
            return (
              <div key={i} onClick={()=>setActive(i)} style={{
                display:"grid",gridTemplateColumns:"1fr auto auto",gap:8,
                alignItems:"center",padding:"10px 14px",cursor:"pointer",
                borderBottom:i<5?"1px solid rgba(255,255,255,0.06)":"none",
                background:active===i?"rgba(22,163,74,.07)":today?"rgba(250,204,21,0.04)":"transparent"}}>
                <div>
                  <div style={{fontSize:11,color:today?"#facc15":"#64748b",marginBottom:2}}>
                    {opp.date} · {opp.home?"Heim":"Ausw."}{today?" · HEUTE":""}
                  </div>
                  <div style={{fontSize:13,fontWeight:600,color:"#e2e8f0"}}>{opp.name}</div>
                </div>
                {played>0?(
                  <div style={{fontFamily:"monospace",fontWeight:700,fontSize:14,textAlign:"right"}}>
                    <span style={{color:"#86efac"}}>{w}</span>
                    <span style={{color:"#475569"}}>:</span>
                    <span style={{color:"#f87171"}}>{l}</span>
                  </div>
                ):(
                  <div style={{fontSize:11,color:"#64748b",fontFamily:"monospace"}}>{exp.toFixed(1)} erw.</div>
                )}
                <div style={{background:col.bg,border:`1px solid ${col.border}`,
                  borderRadius:6,padding:"4px 8px",fontSize:13,fontWeight:800,
                  color:col.text,fontFamily:"monospace",minWidth:44,textAlign:"center"}}>
                  {avg}%
                </div>
              </div>
            );
          })}
        </div>
        <div style={{fontSize:10,color:"#334155",marginTop:10,textAlign:"center"}}>
          Badischer Tennisverband · Baden Sommer 2026 · Badenliga Gr. 022
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
