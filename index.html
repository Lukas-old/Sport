<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liga-Monitor · Tennisgruppe 65</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { min-height: 100vh; background: #0f1923; color: #e0e8f0; font-family: 'Georgia', 'Times New Roman', serif; padding: 28px 20px; }
  header { margin-bottom: 32px; border-bottom: 1px solid #1e3a4a; padding-bottom: 18px; }
  header .eyebrow { font-size: 11px; color: #4a7090; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 6px; }
  header h1 { font-size: 24px; font-weight: 400; color: #c8dff0; }
  header p  { margin-top: 6px; font-size: 13px; color: #5a7a8a; line-height: 1.5; }
  .cards { display: flex; flex-direction: column; gap: 24px; }
  .card { background: #141f2b; border: 1px solid #1e3a4a; border-radius: 10px; padding: 20px; }
  .card-head { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 4px; }
  .card-head span { font-size: 15px; font-weight: 600; color: #c0d8ee; }
  .badge { padding: 2px 10px; border-radius: 4px; font-size: 11px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }
  .badge-pending { background: #3a3a2d; color: #d0c88a; }
  .badge-ok      { background: #2d3a4a; color: #8ab0d0; }
  .card-url  { font-size: 11px; color: #3a6070; margin-top: 3px; word-break: break-all; }
  .card-meta { font-size: 11px; color: #4a6a7a; margin-top: 3px; }
  .snapshot-box { background: #0d1820; border: 1px solid #1a3040; border-radius: 6px; padding: 10px 14px; margin: 12px 0; font-size: 12px; color: #607080; }
  .snapshot-box strong { color: #8ab0c0; }
  .buttons { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }
  button { border-radius: 6px; padding: 9px 18px; font-size: 13px; font-family: inherit; cursor: pointer; border: 1px solid; transition: background 0.15s; }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  .btn-save  { background: #1e4060; color: #7ab0d0; border-color: #2a5070; }
  .btn-save:hover:not(:disabled)  { background: #254d74; }
  .btn-check { background: #223318; color: #8ac870; border-color: #3a5828; }
  .btn-check:hover:not(:disabled) { background: #2b3f1f; }
  .btn-check:disabled { background: #141f2b; color: #3a5060; border-color: #1a2a30; }
  .btn-link { display: inline-block; background: #1a2a3a; color: #6a9ab0; border: 1px solid #2a4050; border-radius: 6px; padding: 9px 18px; font-size: 13px; font-family: inherit; text-decoration: none; transition: background 0.15s; }
  .btn-link:hover { background: #223344; color: #90c0d8; }
  .result { margin-top: 16px; font-size: 13px; border-radius: 6px; padding: 12px 16px; line-height: 1.6; }
  .result-error    { background: #2a1a1a; color: #d08080; }
  .result-saved    { background: #1a2a1a; color: #80c0a0; }
  .result-diff     { background: #1a2a1a; border: 1px solid #3a5828; }
  .result-nochange { background: #1a1f2a; border: 1px solid #1e3040; }
  .result-loading  { background: #1a2030; color: #7a90a0; }
  .result-title          { font-weight: 600; margin-bottom: 8px; font-size: 14px; }
  .result-title.changed  { color: #90d870; }
  .result-title.nochange { color: #6090b0; }
  .diff-block     { margin-bottom: 10px; }
  .diff-label-add { color: #60c060; font-weight: 600; margin-bottom: 3px; }
  .diff-label-rem { color: #c06060; font-weight: 600; margin-bottom: 3px; }
  .diff-item-add  { color: #a0e090; padding-left: 12px; font-size: 12px; }
  .diff-item-rem  { color: #e09090; padding-left: 12px; font-size: 12px; }
  .no-change-note { color: #4a7090; font-size: 12px; }
  .proxy-info { font-size: 10px; color: #3a5060; margin-top: 4px; }
  footer { margin-top: 28px; font-size: 11px; color: #2a4050; text-align: center; }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Tennisgruppe 65 · Liga-Monitor</div>
  <h1>Mannschaftsmeldungen</h1>
  <p>Seiten direkt abrufen · Snapshot speichern · Änderungen erkennen</p>
</header>

<div class="cards" id="cards"></div>

<footer>Kostenlos · Kein API-Key · Snapshots im Browser gespeichert</footer>

<script>
const URLS = [
  {
    id: "b1s2026",
    label: "B1 S 2026 – Gruppe 165",
    url: "https://baden.liga.nu/cgi-bin/WebObjects/nuLigaTENDE.woa/wa/groupPage?championship=B1+S+2026&group=165"
  },
  {
    id: "badens2026",
    label: "Baden S 2026 – Gruppe 22",
    url: "https://baden.liga.nu/cgi-bin/WebObjects/nuLigaTENDE.woa/wa/groupPage?championship=Baden+S+2026&group=22"
  }
];

const STORAGE_KEY = "tennis_monitor_v3";

const PROXIES = [
  { name: "allorigins",  build: url => "https://api.allorigins.win/get?url=" + encodeURIComponent(url),     parse: r => r.json().then(j => j.contents) },
  { name: "corsproxy",   build: url => "https://corsproxy.io/?" + encodeURIComponent(url),                  parse: r => r.text() },
  { name: "thingproxy",  build: url => "https://thingproxy.freeboard.io/fetch/" + encodeURIComponent(url),  parse: r => r.text() }
];

function load() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); }
  catch { return {}; }
}
function save(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

let state = load();

function extractLines(html) {
  const tmp = document.createElement("div");
  tmp.innerHTML = html;
  tmp.querySelectorAll("script,style,noscript").forEach(el => el.remove());
  const text = tmp.innerText || tmp.textContent || "";
  return text.split("\n").map(l => l.trim()).filter(l => l.length > 2 && l.length < 200);
}

async function fetchPage(url, onStatus) {
  let lastError = null;
  for (let i = 0; i < PROXIES.length; i++) {
    const proxy = PROXIES[i];
    onStatus && onStatus("⏳ Versuch " + (i+1) + "/" + PROXIES.length + " via " + proxy.name + " …");
    try {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 18000);
      const resp = await fetch(proxy.build(url), { signal: controller.signal });
      clearTimeout(timer);
      if (!resp.ok) throw new Error("HTTP " + resp.status);
      const content = await proxy.parse(resp);
      if (!content || content.length < 100) throw new Error("Leere Antwort");
      if (!content.includes("nuLiga") && !content.includes("Mannschaft") && !content.includes("Gruppe")) {
        throw new Error("Unerwarteter Seiteninhalt");
      }
      return { content, proxyName: proxy.name };
    } catch(e) {
      lastError = e.name === "AbortError"
        ? new Error(proxy.name + ": Zeitüberschreitung")
        : new Error(proxy.name + ": " + e.message);
    }
  }
  throw lastError || new Error("Alle Proxies fehlgeschlagen");
}

function diffLines(oldLines, newLines) {
  const oldSet = new Set(oldLines);
  const newSet = new Set(newLines);
  return {
    added:   newLines.filter(l => !oldSet.has(l)),
    removed: oldLines.filter(l => !newSet.has(l))
  };
}

let activeId = null;

function renderCard(item) {
  const snap = state[item.id];
  let snapHtml = "";
  if (snap) {
    snapHtml = '<div class="card-meta">Letzter Snapshot: ' + snap.time + ' (' + snap.lines.length + ' Zeilen)</div>'
      + '<div class="snapshot-box"><strong>Inhalt erfasst:</strong> ' + snap.lines.length + ' Textzeilen gespeichert'
      + (snap.proxy ? ' <span class="proxy-info">via ' + snap.proxy + '</span>' : '') + '</div>';
  }
  return '<div class="card" id="card-' + item.id + '">'
    + '<div class="card-head"><span>' + item.label + '</span>'
    + '<span class="badge ' + (snap ? 'badge-ok' : 'badge-pending') + '">'
    + (snap ? 'Snapshot vorhanden' : 'Ausstehend') + '</span></div>'
    + '<div class="card-url">' + item.url + '</div>'
    + snapHtml
    + '<div class="buttons">'
    + '<button class="btn-save"  onclick="doSnapshot(\'' + item.id + '\',\'' + item.url + '\')">📥 Snapshot speichern</button>'
    + '<button class="btn-check" onclick="doCheck(\'' + item.id + '\',\'' + item.url + '\')" '
    + (snap ? '' : 'disabled') + '>🔍 Auf Änderungen prüfen</button>'
    + '<a class="btn-link" href="' + item.url + '" target="_blank">🌐 Seite öffnen</a>'
    + '</div>'
    + '<div id="result-' + item.id + '"></div>'
    + '</div>';
}

function renderAll() {
  document.getElementById("cards").innerHTML = URLS.map(renderCard).join("");
}

function lockCard(id) {
  activeId = id;
  document.getElementById("card-" + id).querySelectorAll("button").forEach(b => b.disabled = true);
}

function showResult(id, html) {
  const el = document.getElementById("result-" + id);
  if (el) el.innerHTML = html;
}

async function doSnapshot(id, url) {
  lockCard(id);
  showResult(id, '<div class="result result-loading">⏳ Seite wird abgerufen …</div>');
  try {
    const { content, proxyName } = await fetchPage(url, msg => {
      showResult(id, '<div class="result result-loading">' + msg + '</div>');
    });
    const lines = extractLines(content);
    const now = new Date().toLocaleString("de-DE");
    state[id] = { lines, time: now, proxy: proxyName };
    save(state);
    renderAll();
    showResult(id, '<div class="result result-saved">✅ Snapshot gespeichert um ' + now + ' – ' + lines.length + ' Textzeilen via <strong>' + proxyName + '</strong></div>');
  } catch(e) {
    renderAll();
    showResult(id, '<div class="result result-error">⚠️ ' + e.message + '<br><small>Bitte erneut versuchen oder Seite direkt öffnen.</small></div>');
  }
  activeId = null;
}

async function doCheck(id, url) {
  if (!state[id]) { alert("Bitte zuerst einen Snapshot speichern."); return; }
  lockCard(id);
  showResult(id, '<div class="result result-loading">⏳ Seite wird abgerufen …</div>');
  try {
    const { content, proxyName } = await fetchPage(url, msg => {
      showResult(id, '<div class="result result-loading">' + msg + '</div>');
    });
    const freshLines = extractLines(content);
    const now = new Date().toLocaleString("de-DE");
    const diff = diffLines(state[id].lines, freshLines);
    const meaningful = l => l.length >= 5 && /[a-zA-ZäöüÄÖÜß]/.test(l);
    const added   = diff.added.filter(meaningful);
    const removed = diff.removed.filter(meaningful);
    const hasChanges = added.length > 0 || removed.length > 0;

    let html2 = '<div class="result ' + (hasChanges ? 'result-diff' : 'result-nochange') + '">'
      + '<div class="result-title ' + (hasChanges ? 'changed' : 'nochange') + '">'
      + (hasChanges ? '🆕 Änderungen gefunden!' : '✔️ Keine Änderungen') + ' · ' + now
      + ' <span class="proxy-info">via ' + proxyName + '</span></div>';

    if (added.length) {
      html2 += '<div class="diff-block"><div class="diff-label-add">+ Neu (' + added.length + '):</div>'
        + added.slice(0,20).map(l => '<div class="diff-item-add">▸ ' + l + '</div>').join("")
        + (added.length > 20 ? '<div class="diff-item-add">… und ' + (added.length-20) + ' weitere</div>' : '')
        + '</div>';
    }
    if (removed.length) {
      html2 += '<div class="diff-block"><div class="diff-label-rem">− Entfernt (' + removed.length + '):</div>'
        + removed.slice(0,20).map(l => '<div class="diff-item-rem">▸ ' + l + '</div>').join("")
        + (removed.length > 20 ? '<div class="diff-item-rem">… und ' + (removed.length-20) + ' weitere</div>' : '')
        + '</div>';
    }
    if (!hasChanges) {
      html2 += '<div class="no-change-note">Stand ist identisch mit dem gespeicherten Snapshot.</div>';
    }
    html2 += '</div>';
    renderAll();
    showResult(id, html2);
  } catch(e) {
    renderAll();
    showResult(id, '<div class="result result-error">⚠️ ' + e.message + '</div>');
  }
  activeId = null;
}

renderAll();
</script>
</body>
</html>
