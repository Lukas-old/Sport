// ─── HELPERS ─────────────────────────────────────────────────────────────────
const NS=4, AC="#dc2626";  // 4er Staffel, Rot-Weiß Lauda
const SK={L:"la26-lineups",R:"la26-results",N:"la26-notes",D:"la26-doubles",DR:"la26-dbl-results"};

const byLK=arr=>[...arr].sort((a,b)=>a.lk-b.lk);
const winProb=(a,b)=>Math.round(100/(1+Math.pow(10,-(b-a)/4)));
const avgLK=pair=>(pair[0].lk+pair[1].lk)/2;

const probStyle=p=>{
  if(p>=68) return{bg:"#14532d",border:"#166534",text:"#86efac",label:"Favorit"};
  if(p>=55) return{bg:"#1a3a20",border:"#166534",text:"#bbf7d0",label:"leicht Fav."};
  if(p>=45) return{bg:"#3f2a04",border:"#854d0e",text:"#fde68a",label:"ausgeglichen"};
  if(p>=32) return{bg:"#3b0f0f",border:"#7f1d1d",text:"#fca5a5",label:"leicht Außens."};
  return{bg:"#2a0606",border:"#450a0a",text:"#f87171",label:"Außenseiter"};
};

function parseResult(str){
  if(!str||!str.trim()) return null;
  const sets=str.trim().split(/\s+/);
  let w=0,l=0;
  for(const s of sets){
    const m=s.match(/^(\d+)[:\-](\d+)$/);
    if(!m) return null;
    +m[1]>+m[2]?w++:+m[2]>+m[1]?l++:null;
  }
  return w>l?'W':l>w?'L':null;
}

function isToday(ds){
  const m=ds.match(/(\d{2})\.(\d{2})\./);
  if(!m) return false;
  const n=new Date();
  return +m[1]===n.getDate()&&+m[2]===(n.getMonth()+1);
}
function fmtDate(ds){
  const days={'Mo.':'Montag','Di.':'Dienstag','Mi.':'Mittwoch','Do.':'Donnerstag',
    'Fr.':'Freitag','Sa.':'Samstag','So.':'Sonntag'};
  const m=ds.match(/^(\S+)\s+(.+)$/);
  return m?(days[m[1]]||m[1])+', '+m[2]+'2026':ds+'2026';
}

// ─── DEFAULTS ────────────────────────────────────────────────────────────────
function defStates(){
  return OPPONENTS.map(opp=>({beck:byLK(LAUDA_ROSTER).slice(0,NS),opp:byLK(opp.players).slice(0,NS)}));
}
function defDoubles(){
  return OPPONENTS.map(opp=>{
    const bk=byLK(LAUDA_ROSTER), op=byLK(opp.players);
    return{pairs:[[bk[0],bk[1]],[bk[2],bk[3]]],oppPairs:[[op[0],op[1]],[op[2],op[3]]]};
  });
}

// ─── STORAGE ─────────────────────────────────────────────────────────────────
const stor=window.storage||{
  get:async k=>{try{const v=localStorage.getItem(k);return v?{value:v}:null;}catch{return null;}},
  set:async(k,v)=>{try{localStorage.setItem(k,v);}catch{}},
};
function saveAll(key,data){stor.set(key,JSON.stringify(data)).catch(()=>{});}

async function loadAll(){
  const st={
    states:defStates(),results:OPPONENTS.map(()=>Array(NS).fill("")),
    notes:OPPONENTS.map(()=>""),doubles:defDoubles(),doublesResults:OPPONENTS.map(()=>["",""]),
  };
  try{
    const vals=await Promise.all([SK.L,SK.R,SK.N,SK.D,SK.DR].map(k=>stor.get(k).catch(()=>null)));
    const [sl,rl,nl,dl,drl]=vals;
    if(sl){const sv=JSON.parse(sl.value);if(sv?.length===OPPONENTS.length){
      st.states=OPPONENTS.map((opp,i)=>{
        const bs=(sv[i]?.beck||[]).map(n=>LAUDA_ROSTER.find(p=>p.name===n)).filter(Boolean);
        const os=(sv[i]?.opp||[]).map(n=>opp.players.find(p=>p.name===n)).filter(Boolean);
        return bs.length===NS&&os.length===NS?{beck:bs,opp:os}
          :{beck:byLK(LAUDA_ROSTER).slice(0,NS),opp:byLK(opp.players).slice(0,NS)};
      });}}
    if(rl){const rv=JSON.parse(rl.value);if(rv?.length===OPPONENTS.length)st.results=rv;}
    if(nl){const nv=JSON.parse(nl.value);if(nv?.length===OPPONENTS.length)st.notes=nv;}
    if(dl){const dv=JSON.parse(dl.value);if(dv?.length===OPPONENTS.length){
      st.doubles=OPPONENTS.map((opp,i)=>{
        try{
          const bk=byLK(LAUDA_ROSTER),op=byLK(opp.players);
          const rec={
            pairs:dv[i].pairs.map(pr=>pr.map(n=>LAUDA_ROSTER.find(p=>p.name===n)||bk[0])),
            oppPairs:dv[i].oppPairs.map(pr=>pr.map(n=>opp.players.find(p=>p.name===n)||op[0])),
          };
          // Sicherheitscheck: genau 2 Paare erwartet
          if(rec.pairs.length!==2||rec.oppPairs.length!==2) return defDoubles()[i];
          return rec;
        }catch{return defDoubles()[i];}
      });}}
    if(drl){const drv=JSON.parse(drl.value);
      if(drv?.length===OPPONENTS.length&&drv.every(r=>r.length===2))st.doublesResults=drv;}
  }catch{}
  return st;
}

// ─── PDF ─────────────────────────────────────────────────────────────────────
function generatePDF(opp,beckL,oppL,results,notes,dbl,dblResults){
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});

  // Header – Rot-Weiß
  doc.setFillColor(185,28,28);doc.rect(0,0,210,30,'F');
  doc.setFillColor(220,38,38);doc.rect(0,20,210,10,'F');
  doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(16);
  doc.text('TC RW LAUDA',14,13);
  doc.setFont('helvetica','normal');doc.setFontSize(9);
  doc.text('Herren 70  |  1. Bezirksliga Gr. 165  |  BTV Bezirk 1  |  Sommer 2026',14,21);
  doc.setFont('helvetica','bold');doc.setFontSize(12);
  doc.text('SPIELBERICHT',196,18,{align:'right'});

  // Spielinfo
  doc.setFillColor(243,246,250);doc.roundedRect(14,35,182,32,2,2,'F');
  doc.setTextColor(30,30,30);doc.setFont('helvetica','bold');doc.setFontSize(9.5);
  doc.text('Datum:',18,44);doc.text('Heimmannschaft:',18,52);doc.text('Gastmannschaft:',18,59);
  doc.setFont('helvetica','normal');
  doc.text(fmtDate(opp.date)+' · 10:00 Uhr',48,44);
  doc.text(opp.home?'TC RW Lauda':opp.name,60,52);
  doc.text(opp.home?opp.name:'TC RW Lauda',60,59);
  doc.setFillColor(185,28,28);doc.roundedRect(153,37,39,10,2,2,'F');
  doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(8.5);
  doc.text(opp.home?'HEIMSPIEL':'GASTSPIEL',172.5,43.5,{align:'center'});

  const HS={fillColor:[185,28,28],textColor:[255,255,255],fontSize:9,fontStyle:'bold',cellPadding:3.5};
  const BS={fontSize:8.5,cellPadding:3,valign:'middle'};
  const CS={0:{cellWidth:8,halign:'center'},3:{cellWidth:14,halign:'center'},
    4:{cellWidth:26,halign:'center',fontStyle:'bold'},5:{cellWidth:14,halign:'center',fontStyle:'bold'}};
  const colorCell=d=>{
    if(d.section==='body'&&d.column.index===5){
      if(d.cell.raw==='Sieg')d.cell.styles.textColor=[12,80,40];
      if(d.cell.raw==='Nied.')d.cell.styles.textColor=[180,30,30];
    }
    if(d.section==='body'&&d.column.index===4&&d.cell.raw!=='--')
      d.cell.styles.textColor=[30,30,120];
  };

  const singlesW=results.filter(r=>parseResult(r)==='W').length;
  const singlesL=results.filter(r=>parseResult(r)==='L').length;

  doc.setTextColor(30,30,30);doc.setFont('helvetica','bold');doc.setFontSize(11);
  doc.text('EINZEL',14,77);

  doc.autoTable({startY:81,theme:'grid',headStyles:HS,bodyStyles:BS,columnStyles:CS,
    didParseCell:colorCell,margin:{left:14,right:14},
    head:[['#','TC RW Lauda (LK)',`${opp.short} (LK)`,'Prog.','Ergebnis','P']],
    body:beckL.map((lp,i)=>{
      const op=oppL[i],prob=winProb(lp.lk,op.lk),res=results[i]||'',wl=parseResult(res);
      return[String(i+1),`${lp.name}\nLK ${lp.lk.toFixed(1)}  *${lp.jg}`,
        `${op.name}\nLK ${op.lk.toFixed(1)}  *${op.jg}`,`${prob}%`,res||'--',
        wl==='W'?'Sieg':wl==='L'?'Nied.':'-'];
    }),
  });

  let y=doc.lastAutoTable.finalY+8;

  // Doppel
  const doublesW=dblResults.filter(r=>parseResult(r)==='W').length;
  const doublesL=dblResults.filter(r=>parseResult(r)==='L').length;
  doc.setFont('helvetica','bold');doc.setFontSize(11);doc.setTextColor(30,30,30);
  doc.text('DOPPEL',14,y);

  doc.autoTable({startY:y+4,theme:'grid',headStyles:HS,bodyStyles:BS,columnStyles:CS,
    didParseCell:colorCell,margin:{left:14,right:14},
    head:[['#','TC RW Lauda (Ø LK)',`${opp.short} (Ø LK)`,'Prog.','Ergebnis','P']],
    body:dbl.pairs.map((bP,di)=>{
      const oP=dbl.oppPairs[di];
      const aB=avgLK(bP),aO=avgLK(oP),prob=winProb(aB,aO);
      const res=dblResults[di]||'',wl=parseResult(res);
      return[`D${di+1}`,
        `${bP[0].name} /\n${bP[1].name}\nO LK ${aB.toFixed(1)}`,
        `${oP[0].name} /\n${oP[1].name}\nO LK ${aO.toFixed(1)}`,
        `${prob}%`,res||'--',wl==='W'?'Sieg':wl==='L'?'Nied.':'-'];
    }),
  });

  y=doc.lastAutoTable.finalY+8;

  const tW=singlesW+doublesW,tL=singlesL+doublesL;
  doc.setFillColor(255,235,235);doc.roundedRect(14,y,182,26,2,2,'F');
  doc.setDrawColor(185,28,28);doc.roundedRect(14,y,182,26,2,2,'S');
  doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(60,60,60);
  doc.text(`Einzel: ${singlesW}:${singlesL}   Doppel: ${doublesW}:${doublesL}`,105,y+9,{align:'center'});
  doc.setFont('helvetica','bold');doc.setFontSize(14);doc.setTextColor(185,28,28);
  doc.text(`Gesamt: ${tW} : ${tL}`,105,y+20,{align:'center'});
  y+=32;

  doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(30,30,30);
  doc.text('Bemerkungen / Notizen:',14,y);y+=6;
  if(notes&&notes.trim()){
    doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(50,50,50);
    const lines=doc.splitTextToSize(notes.trim(),182);
    doc.text(lines,14,y);y+=lines.length*5+4;
  }else{
    doc.setFillColor(250,250,250);doc.rect(14,y,182,12,'F');
    doc.setDrawColor(200,200,200);doc.rect(14,y,182,12,'S');
    doc.setFont('helvetica','italic');doc.setFontSize(8.5);doc.setTextColor(160,160,160);
    doc.text('(keine Bemerkungen)',105,y+8,{align:'center'});y+=18;
  }

  const sy=Math.max(y+12,248);
  doc.setDrawColor(80,80,80);doc.setTextColor(80,80,80);doc.setFont('helvetica','normal');doc.setFontSize(8.5);
  doc.line(14,sy,88,sy);doc.line(108,sy,182,sy);
  doc.text('Unterschrift Heimmannschaft',51,sy+5,{align:'center'});
  doc.text('Unterschrift Gastmannschaft',145,sy+5,{align:'center'});
  doc.line(14,sy+16,88,sy+16);doc.text('Ort, Datum',51,sy+21,{align:'center'});
  doc.setFontSize(7);doc.setTextColor(160,160,160);
  const today=new Date().toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'});
  doc.text(`Erstellt am ${today}  |  TC RW Lauda Begegnungsanalyse  |  BTV 1. Bezirksliga H70 Gr. 165`,105,290,{align:'center'});
  doc.save(`Protokoll_Lauda_${opp.short.replace(/[\s\/]+/g,'_')}_${opp.date.replace('Di. ','').replace(/\./g,'').trim()}.pdf`);
}

// ─── PAIR MEMBER PICKER ──────────────────────────────────────────────────────
function PairMemberPicker({player,roster,onSelect,flip,usedNames=[]}){
  const [open,setOpen]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{
    const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);
  },[]);
  const isK=player.name.includes("★");
  const acc=flip?"#64748b":AC;
  return(
    <div ref={ref} style={{position:"relative"}}>
      <div onClick={()=>setOpen(v=>!v)} style={{
        display:"flex",flexDirection:flip?"row-reverse":"row",alignItems:"center",gap:4,
        cursor:"pointer",padding:"4px 7px",borderRadius:6,
        border:`1px solid ${open?acc:isK?AC+"66":"rgba(255,255,255,0.09)"}`,
        background:open?`${acc}18`:isK?`${AC}0d`:"rgba(255,255,255,0.03)",
        userSelect:"none",transition:"all 0.15s"}}>
        <div style={{flex:1,textAlign:flip?"right":"left"}}>
          <div style={{fontSize:11,fontWeight:600,color:isK?"#fca5a5":"#f1f5f9",lineHeight:1.2}}>{player.name}</div>
          <div style={{fontSize:9,color:"#64748b",fontFamily:"monospace"}}>LK {player.lk.toFixed(1)}  *{player.jg}</div>
        </div>
        <div style={{fontSize:9,color:open?acc:"#475569",transform:open?"rotate(180deg)":"none",transition:"transform 0.18s"}}>▾</div>
      </div>
      {open&&(
        <div style={{position:"absolute",top:"calc(100% + 3px)",left:flip?"auto":0,right:flip?0:"auto",
          zIndex:300,width:215,background:"#1e293b",border:`1px solid ${acc}55`,borderRadius:10,
          boxShadow:"0 12px 40px rgba(0,0,0,0.75)",maxHeight:270,overflowY:"auto"}}>
          <div style={{padding:"5px 11px",fontSize:9.5,color:"#475569",textTransform:"uppercase",
            letterSpacing:"0.09em",borderBottom:"1px solid rgba(255,255,255,0.07)",
            background:"#1e293b",position:"sticky",top:0}}>Spieler wählen</div>
          {byLK(roster).map(p=>{
            const isUsed=usedNames.includes(p.name)&&p.name!==player.name;
            const isCur=p.name===player.name;
            return(
              <div key={p.name} onClick={()=>{if(!isUsed){onSelect(p);setOpen(false);}}}
                style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                  padding:"6px 11px",cursor:isUsed?"not-allowed":"pointer",
                  opacity:isUsed?0.35:1,borderBottom:"1px solid rgba(255,255,255,0.04)",
                  background:isCur?`${acc}20`:"transparent"}}
                onMouseEnter={e=>{if(!isUsed)e.currentTarget.style.background="rgba(255,255,255,0.08)";}}
                onMouseLeave={e=>{e.currentTarget.style.background=isCur?`${acc}20`:"transparent";}}>
                <div style={{fontSize:11,color:"#e2e8f0"}}>{p.name}</div>
                <div style={{fontSize:9.5,color:"#64748b",fontFamily:"monospace"}}>LK {p.lk.toFixed(1)}</div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ─── PLAYER CELL ─────────────────────────────────────────────────────────────
function PlayerCell({player,roster,onSelect,flip,accent}){
  const [open,setOpen]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{
    const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);
  },[]);
  const sorted=byLK(roster);
  const better=sorted.filter(p=>p.lk<player.lk);
  const worse=sorted.filter(p=>p.lk>player.lk||(p.lk===player.lk&&p.name!==player.name));
  const hasOpts=better.length+worse.length>0;
  const curRank=sorted.findIndex(p=>p.name===player.name)+1;
  const isK=player.name.includes("★");
  const Row=p=>{
    const diff=p.lk-player.lk,dc=diff<0?"#86efac":diff>0?"#f87171":"#94a3b8";
    const rk=sorted.findIndex(r=>r.name===p.name)+1;
    return(
      <div key={p.name} onClick={()=>{onSelect(p);setOpen(false);}}
        style={{display:"flex",justifyContent:"space-between",alignItems:"center",
          padding:"7px 12px",cursor:"pointer",borderBottom:"1px solid rgba(255,255,255,0.04)"}}
        onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.08)"}
        onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
        <div><div style={{fontSize:12,color:"#e2e8f0"}}>{p.name}</div>
          <div style={{fontSize:10,color:"#475569",marginTop:1}}>Rang {rk}</div></div>
        <div style={{textAlign:"right",fontFamily:"monospace",fontSize:11}}>
          <div style={{color:dc,fontWeight:600}}>LK {p.lk.toFixed(1)}
            {diff!==0&&<span style={{fontSize:10,opacity:.75,marginLeft:3}}>({diff>0?"+":""}{diff.toFixed(1)})</span>}
          </div>
          <div style={{color:"#475569"}}>*{p.jg}</div>
        </div>
      </div>
    );
  };
  const SL=({label,color})=>(
    <div style={{padding:"4px 12px 3px",fontSize:9,color,textTransform:"uppercase",
      letterSpacing:"0.09em",background:"rgba(255,255,255,0.025)",
      borderBottom:"1px solid rgba(255,255,255,0.05)",position:"sticky",top:36}}>{label}</div>
  );
  return(
    <div ref={ref} style={{position:"relative"}}>
      <div onClick={()=>hasOpts&&setOpen(v=>!v)} style={{
        display:"flex",flexDirection:flip?"row-reverse":"row",alignItems:"center",gap:5,
        cursor:hasOpts?"pointer":"default",padding:"6px 8px",borderRadius:8,
        border:`1px solid ${open?accent:isK?accent+"66":"rgba(255,255,255,0.09)"}`,
        background:open?`${accent}18`:isK?`${accent}0d`:"rgba(255,255,255,0.03)",
        transition:"all 0.15s",userSelect:"none",minHeight:50}}>
        <div style={{flex:1,textAlign:flip?"right":"left"}}>
          <div style={{fontSize:12,fontWeight:600,color:isK?"#fca5a5":"#f1f5f9",lineHeight:1.3}}>{player.name}</div>
          <div style={{fontSize:10,color:"#64748b",marginTop:2,fontFamily:"monospace"}}>LK {player.lk.toFixed(1)} · *{player.jg}</div>
        </div>
        {hasOpts&&<div style={{fontSize:10,color:open?accent:"#475569",transform:open?"rotate(180deg)":"none",transition:"transform 0.18s",lineHeight:1,flexShrink:0}}>▾</div>}
      </div>
      {open&&(
        <div style={{position:"absolute",top:"calc(100% + 4px)",left:flip?"auto":0,right:flip?0:"auto",
          zIndex:200,width:245,background:"#1e293b",border:`1px solid ${accent}55`,borderRadius:10,
          boxShadow:"0 12px 40px rgba(0,0,0,0.75)",maxHeight:320,overflowY:"auto"}}>
          <div style={{padding:"7px 12px",fontSize:10,color:"#475569",textTransform:"uppercase",
            letterSpacing:"0.09em",borderBottom:"1px solid rgba(255,255,255,0.07)",
            background:"#1e293b",position:"sticky",top:0,zIndex:1}}>
            Spieler wechseln · Rang {curRank}
          </div>
          {better.length>0&&<><SL label="↑ Rückgängig (bessere LK)" color="#86efac"/>{better.map(Row)}</>}
          {worse.length>0&&<><SL label="↓ Ersatz (schlechtere LK)" color="#f87171"/>{worse.map(Row)}</>}
        </div>
      )}
    </div>
  );
}

  const probs=laudaL.map((p,i)=>winProb(p.lk,oppL[i].lk));
  const avg=Math.round(probs.reduce((a,b)=>a+b)/NS);
  const exp=probs.reduce((s,p)=>s+p/100,0);
  const col=probStyle(avg);
  const sW=results.filter(r=>parseResult(r)==='W').length;
  const sL=results.filter(r=>parseResult(r)==='L').length;
  const dW=dblResults.filter(r=>parseResult(r)==='W').length;
  const dL=dblResults.filter(r=>parseResult(r)==='L').length;
  const tW=sW+dW,tL=sL+dL,tP=tW+tL;
  const today=isToday(opp.date);
  const hasNeckarWarn=opp.short==='Neckargemünd';
  const orderWarn=dbl.pairs.length>=2&&avgLK(dbl.pairs[0])>avgLK(dbl.pairs[1]);
  const usedLauda=[0,1].map(di=>dbl.pairs.filter((_,j)=>j!==di).flat().map(p=>p.name));

  return(
    <div>
      <div style={{background:"rgba(255,255,255,0.03)",borderRadius:10,padding:"12px 14px",

              letterSpacing:"0.1em",marginBottom:3,fontWeight:today?700:400}}>

            </div>
            <div style={{fontSize:15,fontWeight:700,color:"#f1f5f9"}}>
              {opp.home?`vs. ${opp.short}`:`bei ${opp.short}`}

            {tP>0&&(

                <span style={{color:"#64748b"}}>Gesamt: </span>

                <span style={{color:"#64748b"}}> : </span>
                <span style={{color:"#f87171",fontWeight:700}}>{tL}</span>

            <div style={{fontSize:24,fontWeight:900,color:col.text,fontFamily:"monospace",lineHeight:1}}>{avg}%</div>
            <div style={{fontSize:10,color:"#64748b",marginTop:2}}>{exp.toFixed(1)} Pkt erw.</div>
          </div>
        </div>
        {hasNeckarWarn&&(
          <div style={{marginTop:8,padding:"6px 10px",borderRadius:6,
            background:"rgba(234,179,8,0.1)",border:"1px solid rgba(234,179,8,0.35)",

            <span style={{color:"#86efac"}}>{dW}</span>

        <div style={{borderRadius:10,border:"1px solid rgba(255,255,255,0.08)"}}>
          {[0,1].map(di=>(
            <DoublesRow key={di} di={di}

              onLaudaChange={(pi,p)=>onLaudaDbl(di,pi,p)} onOppChange={(pi,p)=>onOppDbl(di,pi,p)}

          style={{width:"100%",background:"rgba(255,255,255,0.04)",
            border:"1px solid rgba(255,255,255,0.11)",borderRadius:8,
            color:"#e2e8f0",fontSize:12,padding:"8px 10px",outline:"none",lineHeight:1.5}}/>
      </div>
    </div>
  );
}

// ─── APP ─────────────────────────────────────────────────────────────────────
function App(){
  const [active,setActive]=useState(0);
  const [loaded,setLoaded]=useState(false);
  const [states,setStates]=useState(defStates);
  const [results,setResults]=useState(()=>OPPONENTS.map(()=>Array(NS).fill("")));
  const [notes,setNotes]=useState(()=>OPPONENTS.map(()=>""));
  const [doubles,setDoubles]=useState(defDoubles);
  const [dblResults,setDR]=useState(()=>OPPONENTS.map(()=>["",""]));

  useEffect(()=>{
    loadAll().then(d=>{
      setStates(d.states);setResults(d.results);setNotes(d.notes);
      setDoubles(d.doubles);setDR(d.doublesResults);setLoaded(true);
    });
  },[]);

  useEffect(()=>{if(!loaded)return;
    saveAll(SK.L,states.map(s=>({beck:s.beck.map(p=>p.name),opp:s.opp.map(p=>p.name)})));
  },[states,loaded]);
  useEffect(()=>{if(!loaded)return;saveAll(SK.R,results);},[results,loaded]);
  useEffect(()=>{if(!loaded)return;saveAll(SK.N,notes);},[notes,loaded]);
  useEffect(()=>{if(!loaded)return;
    saveAll(SK.D,doubles.map(d=>({
      pairs:d.pairs.map(pr=>pr.map(p=>p.name)),
      oppPairs:d.oppPairs.map(pr=>pr.map(p=>p.name)),
    })));
  },[doubles,loaded]);
  useEffect(()=>{if(!loaded)return;saveAll(SK.DR,dblResults);},[dblResults,loaded]);

  const setLauda=(mi,ri,p)=>setStates(prev=>{const n=prev.map(s=>({beck:[...s.beck],opp:[...s.opp]}));n[mi].beck[ri]=p;return n;});
  const setOpp=(mi,ri,p)=>setStates(prev=>{const n=prev.map(s=>({beck:[...s.beck],opp:[...s.opp]}));n[mi].opp[ri]=p;return n;});
  const setResult=(mi,ri,v)=>setResults(prev=>{const n=prev.map(r=>[...r]);n[mi][ri]=v;return n;});
  const setNote=(mi,v)=>setNotes(prev=>{const n=[...prev];n[mi]=v;return n;});
  const setLaudaDbl=(mi,di,pi,p)=>setDoubles(prev=>{
    const n=prev.map(d=>({pairs:d.pairs.map(pr=>[...pr]),oppPairs:d.oppPairs.map(pr=>[...pr])}));
    n[mi].pairs[di][pi]=p;return n;
  });
  const setOppDbl=(mi,di,pi,p)=>setDoubles(prev=>{
    const n=prev.map(d=>({pairs:d.pairs.map(pr=>[...pr]),oppPairs:d.oppPairs.map(pr=>[...pr])}));
    n[mi].oppPairs[di][pi]=p;return n;
  });
  const setDblResult=(mi,di,v)=>setDR(prev=>{const n=prev.map(r=>[...r]);n[mi][di]=v;return n;});
  const resetMatch=mi=>{
    setStates(prev=>{const n=[...prev];n[mi]={beck:byLK(LAUDA_ROSTER).slice(0,NS),opp:byLK(OPPONENTS[mi].players).slice(0,NS)};return n;});
    setDoubles(prev=>{const n=[...prev];n[mi]=defDoubles()[mi];return n;});
  };

  if(!loaded) return(
    <div style={{minHeight:"100vh",background:"#0a0f1e",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{color:"#64748b",fontSize:13}}>Lade gespeicherte Daten …</div>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",background:"#0a0f1e",color:"#e2e8f0",
      fontFamily:"'Segoe UI',sans-serif",maxWidth:680,margin:"0 auto",paddingBottom:48}}>

      {/* Header */}
      <div style={{padding:"18px 16px 14px",borderBottom:"1px solid rgba(255,255,255,0.07)",
        background:"linear-gradient(180deg,rgba(220,38,38,.12) 0%,transparent 100%)"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
          <div style={{width:9,height:9,borderRadius:"50%",background:AC,boxShadow:`0 0 8px ${AC}`}}/>
          <span style={{fontSize:10,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.12em"}}>
            BTV · Bezirk 1 Sommer 2026 · 1. Bezirksliga Gr. 165
          </span>
        </div>
        <div style={{fontSize:20,fontWeight:800,color:"#f8fafc",letterSpacing:"-0.02em"}}>
          TC RW Lauda — Begegnungsanalyse
        </div>
        <div style={{fontSize:12,color:"#64748b",marginTop:3}}>
          Herren 70 · 4er Staffel · 4 Einzel + 2 Doppel · Alles wird automatisch gespeichert
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",overflowX:"auto",gap:6,padding:"10px 16px",
        borderBottom:"1px solid rgba(255,255,255,0.07)",scrollbarWidth:"none"}}>
        {OPPONENTS.map((opp,i)=>{
          const s=states[i];
          const sAvg=Math.round(s.beck.map((p,j)=>winProb(p.lk,s.opp[j].lk)).reduce((a,b)=>a+b)/NS);
          const col=probStyle(sAvg);
          const on=active===i,today=isToday(opp.date);
          const sW=results[i].filter(r=>parseResult(r)==='W').length;
          const sL=results[i].filter(r=>parseResult(r)==='L').length;
          const dW=dblResults[i].filter(r=>parseResult(r)==='W').length;
          const dL=dblResults[i].filter(r=>parseResult(r)==='L').length;
          const tW=sW+dW,tL=sL+dL,played=tW+tL;
          return(
            <button key={i} onClick={()=>setActive(i)} style={{
              flexShrink:0,cursor:"pointer",textAlign:"left",padding:"7px 12px",borderRadius:8,
              background:on?"rgba(220,38,38,.18)":today?"rgba(250,204,21,0.07)":"rgba(255,255,255,.04)",
              border:on?"1px solid rgba(220,38,38,.5)":today?"1px solid rgba(250,204,21,0.4)":"1px solid rgba(255,255,255,.09)",
              transition:"all .15s"}}>
              <div style={{fontSize:10,color:today?"#facc15":"#64748b",marginBottom:2,fontWeight:today?700:400}}>
                {opp.date}{today?" · HEUTE":""}
              </div>
              <div style={{fontSize:12,fontWeight:600,color:on?"#f1f5f9":"#94a3b8"}}>{opp.short}</div>
              <div style={{display:"flex",alignItems:"center",gap:5,marginTop:1}}>
                <div style={{fontSize:12,fontWeight:700,color:col.text,fontFamily:"monospace"}}>{sAvg}%</div>
                {played>0&&<div style={{fontSize:10,fontFamily:"monospace"}}>
                  <span style={{color:"#86efac"}}>{tW}</span>
                  <span style={{color:"#475569"}}>:</span>
                  <span style={{color:"#f87171"}}>{tL}</span>
                </div>}
              </div>
            </button>
          );
        })}
      </div>

      {/* Match view */}
      <div style={{padding:"14px 16px"}}>
        <MatchView
          opp={OPPONENTS[active]}
          laudaL={states[active].beck} oppL={states[active].opp}
          onLaudaSel={(ri,p)=>setLauda(active,ri,p)} onOppSel={(ri,p)=>setOpp(active,ri,p)}
          results={results[active]} onResult={(ri,v)=>setResult(active,ri,v)}
          notes={notes[active]} onNotes={v=>setNote(active,v)}
          dbl={doubles[active]} dblResults={dblResults[active]}
          onLaudaDbl={(di,pi,p)=>setLaudaDbl(active,di,pi,p)}
          onOppDbl={(di,pi,p)=>setOppDbl(active,di,pi,p)}
          onDblResult={(di,v)=>setDblResult(active,di,v)}
          onReset={()=>resetMatch(active)}
          onPDF={()=>generatePDF(OPPONENTS[active],states[active].beck,states[active].opp,
            results[active],notes[active],doubles[active],dblResults[active])}
        />
      </div>

      {/* Saisonübersicht */}
      <div style={{padding:"0 16px"}}>
        <div style={{fontSize:10,color:"#475569",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8}}>
          Saisonübersicht
        </div>
        <div style={{borderRadius:10,border:"1px solid rgba(255,255,255,0.08)"}}>
          {OPPONENTS.map((opp,i)=>{
            const s=states[i];
            const probs=s.beck.map((p,j)=>winProb(p.lk,s.opp[j].lk));
            const avg=Math.round(probs.reduce((a,b)=>a+b)/NS);
            const exp=probs.reduce((s,p)=>s+p/100,0);
            const col=probStyle(avg);
            const today=isToday(opp.date);
            const sW=results[i].filter(r=>parseResult(r)==='W').length;
            const sL=results[i].filter(r=>parseResult(r)==='L').length;
            const dW=dblResults[i].filter(r=>parseResult(r)==='W').length;
            const dL=dblResults[i].filter(r=>parseResult(r)==='L').length;
            const tW=sW+dW,tL=sL+dL,played=tW+tL;
            return(
              <div key={i} onClick={()=>setActive(i)} style={{
                display:"grid",gridTemplateColumns:"1fr auto auto",gap:8,
                alignItems:"center",padding:"10px 14px",cursor:"pointer",
                borderBottom:i<4?"1px solid rgba(255,255,255,0.06)":"none",
                background:active===i?"rgba(220,38,38,.07)":today?"rgba(250,204,21,0.04)":"transparent"}}>
                <div>
                  <div style={{fontSize:11,color:today?"#facc15":"#64748b",marginBottom:2}}>
                    {opp.date} · {opp.home?"Heim":"Ausw."}{today?" · HEUTE":""}
                  </div>
                  <div style={{fontSize:13,fontWeight:600,color:"#e2e8f0"}}>{opp.name}</div>
                </div>
                {played>0?(
                  <div style={{fontFamily:"monospace",fontWeight:700,fontSize:14,textAlign:"right"}}>
                    <span style={{color:"#86efac"}}>{tW}</span>
                    <span style={{color:"#475569"}}>:</span>
                    <span style={{color:"#f87171"}}>{tL}</span>
                    <div style={{fontSize:9,color:"#475569",fontWeight:400}}>E:{sW}:{sL} D:{dW}:{dL}</div>
                  </div>
                ):(
                  <div style={{fontSize:11,color:"#64748b",fontFamily:"monospace"}}>{exp.toFixed(1)} erw.</div>
                )}
                <div style={{background:col.bg,border:`1px solid ${col.border}`,
                  borderRadius:6,padding:"4px 8px",fontSize:13,fontWeight:800,
                  color:col.text,fontFamily:"monospace",minWidth:44,textAlign:"center"}}>{avg}%</div>
              </div>
            );
          })}
        </div>
        <div style={{fontSize:10,color:"#334155",marginTop:10,textAlign:"center"}}>
          Badischer Tennisverband · Bezirk 1 Sommer 2026 · 1. Bezirksliga Gr. 165
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
